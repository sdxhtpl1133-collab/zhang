<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>张静娴PPT</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="slideshow" id="slideshow">
            <!-- 幻灯片将通过JavaScript动态添加 -->
        </div>
    </div>
    
    <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
    </div>
    
    <div class="slide-indicators" id="slideIndicators">
        <!-- 这里将添加幻灯片指示器 -->
    </div>
    
    <!-- 左侧上下导航按钮 -->
    <div class="nav-buttons left-nav">
        <button class="nav-btn up-btn" id="leftUpBtn">↑</button>
        <button class="nav-btn down-btn" id="leftDownBtn">↓</button>
    </div>
    
    <!-- 右侧上下导航按钮 -->
    <div class="nav-buttons right-nav">
        <button class="nav-btn up-btn" id="rightUpBtn">↑</button>
        <button class="nav-btn down-btn" id="rightDownBtn">↓</button>
    </div>
    
    <button class="fullscreen-btn" id="fullscreenBtn">⛶</button>

    <script>
        // 幻灯片数据
        const slides = [
            { src: 'html_files/file1.html', alt: '幻灯片 1' },
            { src: 'html_files/file2.html', alt: '幻灯片 2' },
            { src: 'html_files/file3.html', alt: '幻灯片 3' },
            { src: 'html_files/file4.html', alt: '幻灯片 4' },
            { src: 'html_files/file5.html', alt: '幻灯片 5' },
            { src: 'html_files/file6.html', alt: '幻灯片 6' },
            { src: 'html_files/file7.html', alt: '幻灯片 7' },
            { src: 'html_files/file8.html', alt: '幻灯片 8' },
            { src: 'html_files/file9.html', alt: '幻灯片 9' },
            { src: 'html_files/file10.html', alt: '幻灯片 10' },
            { src: 'html_files/file11.html', alt: '幻灯片 11' }
        ];
        
        // DOM元素
        const slideshow = document.getElementById('slideshow');
        const slideIndicators = document.getElementById('slideIndicators');
        const progressBar = document.getElementById('progressBar');
        const fullscreenBtn = document.getElementById('fullscreenBtn');
        
        // 全局变量
        let currentSlide = 0;
        
        // 初始化幻灯片
        function initSlides() {
            slideshow.innerHTML = '';
            slideIndicators.innerHTML = '';
            
            if (slides.length === 0) {
                const noSlidesMessage = document.createElement('div');
                noSlidesMessage.textContent = '没有找到幻灯片，请检查图片路径';
                noSlidesMessage.style.cssText = `
                    position: absolute;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    color: #fff;
                    font-size: 18px;
                    text-align: center;
                `;
                slideshow.appendChild(noSlidesMessage);
                return;
            }
            
            slides.forEach((slide, index) => {
                // 创建幻灯片元素
                const slideElement = document.createElement('div');
                slideElement.classList.add('slide');
                slideElement.dataset.index = index;
                
                // 设置样式
                slideElement.style.position = 'absolute';
                slideElement.style.top = '0';
                slideElement.style.left = '0';
                slideElement.style.width = '100%';
                slideElement.style.height = '100%';
                slideElement.style.opacity = index === currentSlide ? '1' : '0';
                slideElement.style.zIndex = index === currentSlide ? '1' : '0';
                slideElement.style.transition = 'opacity 0.5s ease';
                
                // 创建加载中动画
                const spinnerElement = document.createElement('div');
                spinnerElement.classList.add('loading-spinner');
                slideElement.appendChild(spinnerElement);
                
                // 创建iframe元素
                const iframeElement = document.createElement('iframe');
                iframeElement.src = slide.src;
                iframeElement.alt = slide.alt;
                iframeElement.style.width = '100%';
                iframeElement.style.height = '100%';
                iframeElement.style.border = 'none';
                iframeElement.style.background = '#fff';
                
                // 处理iframe加载
                iframeElement.onload = function() {
                    spinnerElement.style.display = 'none';
                };
                
                iframeElement.onerror = function() {
                    spinnerElement.style.display = 'none';
                    this.src = 'data:text/html;charset=utf-8,%3Chtml%3E%3Cbody%3E%3Cdiv style%3D%22display%3Aflex%3Bjustify-content%3Acenter%3Balign-items%3Acenter%3Bheight%3A100%25%3Bfont-size%3A20px%3Bcolor%3A%23666%22%3EHTML文件加载失败%3C%2Fdiv%3E%3C%2Fbody%3E%3C%2Fhtml%3E';
                };
                
                slideElement.appendChild(iframeElement);
                slideshow.appendChild(slideElement);
                
                // 创建指示器
                const indicator = document.createElement('div');
                indicator.classList.add('indicator');
                indicator.dataset.index = index;
                if (index === currentSlide) {
                    indicator.classList.add('active');
                }
                
                indicator.addEventListener('click', () => {
                    goToSlide(index);
                });
                
                slideIndicators.appendChild(indicator);
            });
        }
        
        // 切换到指定幻灯片
        function goToSlide(newIndex) {
            // 循环索引处理
            if (newIndex < 0) {
                newIndex = slides.length - 1;
            } else if (newIndex >= slides.length) {
                newIndex = 0;
            }
            
            // 避免不必要的切换
            if (newIndex === currentSlide) {
                return;
            }
            
            // 获取所有幻灯片
            const allSlides = document.querySelectorAll('.slide');
            
            // 隐藏所有幻灯片
            allSlides.forEach((slide, index) => {
                slide.style.opacity = '0';
                slide.style.zIndex = '0';
            });
            
            // 显示目标幻灯片
            if (newIndex >= 0 && newIndex < allSlides.length) {
                allSlides[newIndex].style.opacity = '1';
                allSlides[newIndex].style.zIndex = '1';
                currentSlide = newIndex;
                
                // 更新指示器
                updateIndicators();
                
                // 重置进度条
                resetProgressBar();
                
                // 显示提示信息
                showTempMessage(`第 ${currentSlide + 1} 张 / 共 ${slides.length} 张`, 500);
            }
        }
        
        // 上一张幻灯片
        function prevSlide() {
            goToSlide(currentSlide - 1);
        }
        
        // 下一张幻灯片
        function nextSlide() {
            goToSlide(currentSlide + 1);
        }
        
        // 更新指示器
        function updateIndicators() {
            const indicators = document.querySelectorAll('.indicator');
            indicators.forEach((indicator, index) => {
                if (index === currentSlide) {
                    indicator.classList.add('active');
                } else {
                    indicator.classList.remove('active');
                }
            });
        }
        
        // 重置进度条
        function resetProgressBar() {
            if (progressBar) {
                progressBar.style.width = '0%';
            }
        }
        
        // 切换全屏模式
        function toggleFullscreen() {
            if (!document.fullscreenElement && !document.mozFullScreenElement && !document.webkitFullscreenElement && !document.msFullscreenElement) {
                // 尝试不同浏览器的全屏API
                if (document.documentElement.requestFullscreen) {
                    document.documentElement.requestFullscreen().catch(err => {
                        handleFullscreenError(err);
                    });
                } else if (document.documentElement.mozRequestFullScreen) {
                    document.documentElement.mozRequestFullScreen().catch(err => {
                        handleFullscreenError(err);
                    });
                } else if (document.documentElement.webkitRequestFullscreen) {
                    // 对于iOS设备，需要特殊处理
                    if (/iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream) {
                        showTempMessage('在iOS设备上，请使用屏幕旋转锁定并最大化浏览器窗口', 3000);
                    } else {
                        document.documentElement.webkitRequestFullscreen().catch(err => {
                            handleFullscreenError(err);
                        });
                    }
                } else if (document.documentElement.msRequestFullscreen) {
                    document.documentElement.msRequestFullscreen().catch(err => {
                        handleFullscreenError(err);
                    });
                } else {
                    showTempMessage('您的浏览器不支持全屏模式', 2000);
                }
            } else {
                if (document.exitFullscreen) {
                    document.exitFullscreen();
                } else if (document.mozCancelFullScreen) {
                    document.mozCancelFullScreen();
                } else if (document.webkitExitFullscreen) {
                    document.webkitExitFullscreen();
                } else if (document.msExitFullscreen) {
                    document.msExitFullscreen();
                }
            }
        }
        
        // 处理全屏错误
        function handleFullscreenError(err) {
            console.error('全屏错误:', err);
            // 根据错误类型显示不同的提示
            if (err.name === 'NotAllowedError') {
                showTempMessage('需要用户交互才能切换全屏模式', 2000);
            } else if (err.name === 'SecurityError') {
                showTempMessage('安全限制阻止了全屏模式', 2000);
            } else {
                showTempMessage('无法切换全屏模式', 2000);
            }
        }
        
        // 显示临时消息
        function showTempMessage(message, duration = 2000) {
            let messageElement = document.getElementById('tempMessage');
            
            if (!messageElement) {
                messageElement = document.createElement('div');
                messageElement.id = 'tempMessage';
                messageElement.style.cssText = `
                    position: fixed;
                    top: 50%;
                    left: 50%;
                    transform: translate(-50%, -50%);
                    background-color: rgba(0, 0, 0, 0.8);
                    color: white;
                    padding: 15px 30px;
                    border-radius: 5px;
                    z-index: 1000;
                    font-size: 16px;
                    backdrop-filter: blur(5px);
                    transition: opacity 0.3s, transform 0.3s;
                `;
                document.body.appendChild(messageElement);
            }
            
            messageElement.textContent = message;
            messageElement.style.opacity = '1';
            messageElement.style.transform = 'translate(-50%, -50%) scale(1)';
            
            setTimeout(() => {
                messageElement.style.opacity = '0';
                messageElement.style.transform = 'translate(-50%, -50%) scale(0.8)';
                
                setTimeout(() => {
                    if (messageElement.parentNode) {
                        messageElement.parentNode.removeChild(messageElement);
                    }
                }, 300);
            }, duration);
        }
        
        // 初始化事件监听器
        function initEventListeners() {
            // 全屏按钮
            fullscreenBtn.addEventListener('click', toggleFullscreen);
            
            // 导航按钮
            const leftUpBtn = document.getElementById('leftUpBtn');
            const leftDownBtn = document.getElementById('leftDownBtn');
            const rightUpBtn = document.getElementById('rightUpBtn');
            const rightDownBtn = document.getElementById('rightDownBtn');
            
            if (leftUpBtn) leftUpBtn.addEventListener('click', prevSlide);
            if (leftDownBtn) leftDownBtn.addEventListener('click', nextSlide);
            if (rightUpBtn) rightUpBtn.addEventListener('click', prevSlide);
            if (rightDownBtn) rightDownBtn.addEventListener('click', nextSlide);
            
            // 点击事件
            document.addEventListener('click', (e) => {
                if (e.target.classList.contains('nav-btn') || e.target.classList.contains('fullscreen-btn')) {
                    return;
                }
                nextSlide();
            });
            
            // 双击事件
            document.addEventListener('dblclick', (e) => {
                if (e.target.classList.contains('nav-btn') || e.target.classList.contains('fullscreen-btn')) {
                    return;
                }
                prevSlide();
            });
            
            // 键盘事件
            document.addEventListener('keydown', (e) => {
                if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.isContentEditable) {
                    return;
                }
                
                switch (e.key) {
                    case 'ArrowLeft':
                        prevSlide();
                        break;
                    case 'ArrowRight':
                        nextSlide();
                        break;
                    case 'f':
                    case 'F':
                        toggleFullscreen();
                        break;
                    case 'Escape':
                        if (document.fullscreenElement) {
                            document.exitFullscreen();
                        }
                        break;
                    case '1':
                    case '2':
                    case '3':
                    case '4':
                    case '5':
                    case '6':
                    case '7':
                    case '8':
                    case '9':
                        const slideNum = parseInt(e.key) - 1;
                        if (slideNum >= 0 && slideNum < slides.length) {
                            goToSlide(slideNum);
                        }
                        break;
                }
            });
            
            // 全屏状态变化 - 支持不同浏览器
            document.addEventListener('fullscreenchange', updateFullscreenButton);
            document.addEventListener('mozfullscreenchange', updateFullscreenButton);
            document.addEventListener('webkitfullscreenchange', updateFullscreenButton);
            document.addEventListener('MSFullscreenChange', updateFullscreenButton);
            
            function updateFullscreenButton() {
                if (document.fullscreenElement || document.mozFullScreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
                    fullscreenBtn.textContent = '⤦';
                } else {
                    fullscreenBtn.textContent = '⛶';
                }
            }
        }
        
        // 初始化
        function init() {
            initSlides();
            initEventListeners();
            
            // 显示使用提示
            setTimeout(() => {
                showTempMessage('单击下一页，双击上一页，← → 键切换幻灯片，F 键全屏', 3000);
            }, 1000);
        }
        
        // 页面加载完成后初始化
        if (document.readyState === 'loading') {
            window.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>

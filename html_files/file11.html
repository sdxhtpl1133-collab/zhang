<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>加入学习创新部</title>
  <script src="https://qn.cache.wpscdn.cn/copilot-test/copilot-cdn/js/tailwindcss@3.4.17.js"></script>
  <link href="https://qn.cache.wpscdn.cn/copilot-test/copilot-cdn/css/fontawesome-free@6.4.0.css" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      list-style: none;
      text-decoration: none;
      box-sizing: border-box;
      user-select: none;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    .slide-container {
      width: 100vw;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background: linear-gradient(135deg, #E3F2FD 0%, #E0F7FA 50%, #E8F5E9 100%);
      padding: 60px;
      position: relative;
      overflow: hidden;
    }
    
    .slide-central-glow {
      position: absolute;
      width: 600px;
      height: 600px;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(21,101,192,0.08) 0%, transparent 70%);
      z-index: 0;
    }
    
    .slide-decoration-icon {
      position: absolute;
      z-index: 1;
    }
    
    .slide-icon-lightbulb {
      top: 80px;
      left: 120px;
      font-size: 60px;
      color: #FF6D00;
      opacity: 0.15;
    }
    
    .slide-icon-gear {
      top: 100px;
      right: 150px;
      font-size: 80px;
      color: #00ACC1;
      opacity: 0.12;
    }
    
    .slide-icon-book {
      bottom: 100px;
      left: 100px;
      font-size: 50px;
      color: #1565C0;
      opacity: 0.12;
    }
    
    .slide-icon-rocket {
      bottom: 120px;
      right: 130px;
      font-size: 55px;
      color: #FF6D00;
      opacity: 0.15;
    }
    
    .slide-slogan-container {
      max-width: 900px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 32px;
      text-align: center;
      z-index: 10;
    }
    
    .slide-main-slogan {
      font-family: "Microsoft YaHei", "SimHei", sans-serif;
      font-size: 48px !important;
      font-weight: 700 !important;
      letter-spacing: 4px;
      background: linear-gradient(90deg, #1565C0 0%, #00ACC1 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    
    .slide-sub-slogan {
      font-family: "Microsoft YaHei", "SimHei", sans-serif;
      font-size: 28px !important;
      font-weight: 500 !important;
      color: #333333;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>
  <div class="slide-container">
    <!-- 中央光晕背景 -->
    <div class="slide-central-glow"></div>
    
    <!-- 装饰图标 -->
    <i class="fa-solid fa-lightbulb slide-decoration-icon slide-icon-lightbulb"></i>
    <i class="fa-solid fa-gear slide-decoration-icon slide-icon-gear"></i>
    <i class="fa-solid fa-book-open slide-decoration-icon slide-icon-book"></i>
    <i class="fa-solid fa-rocket slide-decoration-icon slide-icon-rocket"></i>
    
    <!-- 中心口号区域 -->
    <div class="slide-slogan-container">
      <p class="slide-main-slogan">让学习更高效，让创新更简单！</p>
      <p class="slide-sub-slogan">加入学习创新部，一起成长，一起创新！</p>
    </div>
  </div>
</body>
</html>

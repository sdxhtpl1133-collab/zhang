<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我们是谁</title>
  <script src="https://qn.cache.wpscdn.cn/copilot-test/copilot-cdn/js/tailwindcss@3.4.17.js"></script>
  <link href="https://qn.cache.wpscdn.cn/copilot-test/copilot-cdn/css/fontawesome-free@6.4.0.css" rel="stylesheet" />
  <script src="https://qn.cache.wpscdn.cn/copilot-test/copilot-cdn/js/echarts@5.4.3.min.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      list-style: none;
      text-decoration: none;
      box-sizing: border-box;
      user-select: none;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="slide-container" style="width: 100vw; height: 100vh; display: flow-root; background: #F5F9FC; padding-top: 40px; padding-left: 48px; padding-right: 48px;">
    
    <!-- 标题区 -->
    <div style="height: 60px; display: flex; align-items: center;">
      <h1 style="font-size: 36px; font-weight: 700; color: #1565C0; font-family: 'Microsoft YaHei', 'SimHei', sans-serif;">我们是谁</h1>
    </div>
    
    <!-- 间距 -->
    <div style="height: 24px;"></div>
    
    <!-- 主内容区 -->
    <div style="height: 556px; display: flex; gap: 32px;">
      
      <!-- 左侧文本区 -->
      <div style="width: 592px; height: 100%; display: flex; flex-direction: column; gap: 20px; justify-content: center;">
        
        <!-- 卡片1：部门定位 -->
        <div style="background: #FFFFFF; border-radius: 12px; box-shadow: 0 4px 16px rgba(21, 101, 192, 0.08); padding: 24px; position: relative;">

          <div style="padding-left: 16px;">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
              <i class="fa-solid fa-location-dot" style="color: #1565C0; font-size: 20px;"></i>
              <span style="font-size: 22px; font-weight: 600; color: #1565C0; font-family: 'Microsoft YaHei', 'SimHei', sans-serif;">部门定位</span>
            </div>
            <p style="font-size: 18px; font-weight: 400; color: #333333; line-height: 1.6; font-family: 'Microsoft YaHei', 'SimSun', sans-serif;">隶属于云南外事外语职业学院学生社团联合会。</p>
          </div>
        </div>
        
        <!-- 卡片2：核心宗旨 -->
        <div style="background: #FFFFFF; border-radius: 12px; box-shadow: 0 4px 16px rgba(21, 101, 192, 0.08); padding: 24px; position: relative;">
          <div style="position: absolute; left: 0; top: 24px; bottom: 24px; width: 4px; background: #00ACC1; border-radius: 2px;"></div>
          <div style="padding-left: 16px;">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
              <i class="fa-solid fa-bullseye" style="color: #1565C0; font-size: 20px;"></i>
              <span style="font-size: 22px; font-weight: 600; color: #1565C0; font-family: 'Microsoft YaHei', 'SimHei', sans-serif;">核心宗旨</span>
            </div>
            <p style="font-size: 18px; font-weight: 400; color: #333333; line-height: 1.6; font-family: 'Microsoft YaHei', 'SimSun', sans-serif;">旨在提升同学们的学习能力、创新思维和团队合作能力。</p>
          </div>
        </div>
        
        <!-- 卡片3：平台愿景 -->
        <div style="background: #FFFFFF; border-radius: 12px; box-shadow: 0 4px 16px rgba(21, 101, 192, 0.08); padding: 24px; position: relative;">
          <div style="position: absolute; left: 0; top: 24px; bottom: 24px; width: 4px; background: #00ACC1; border-radius: 2px;"></div>
          <div style="padding-left: 16px;">
            <div style="display: flex; align-items: center; gap: 10px; margin-bottom: 12px;">
              <i class="fa-solid fa-rocket" style="color: #1565C0; font-size: 20px;"></i>
              <span style="font-size: 22px; font-weight: 600; color: #1565C0; font-family: 'Microsoft YaHei', 'SimHei', sans-serif;">平台愿景</span>
            </div>
            <p style="font-size: 18px; font-weight: 400; color: #333333; line-height: 1.6; font-family: 'Microsoft YaHei', 'SimSun', sans-serif;">打造校园内学习交流、创新实践的优质平台。</p>
          </div>
        </div>
        
      </div>
      
      <!-- 右侧视觉区 -->
      <div style="width: 560px; height: 100%; background: linear-gradient(135deg, #E3F2FD 0%, #E0F7FA 100%); border-radius: 16px; position: relative; overflow: hidden;">
        
        <!-- 灯泡图标 - 象征创意 -->
        <div style="position: absolute; top: 30px; left: 50%; transform: translateX(-50%);">
          <div style="width: 60px; height: 60px; background: linear-gradient(135deg, #FF6D00 0%, #FFB74D 100%); border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 20px rgba(255, 109, 0, 0.3);">
            <i class="fa-solid fa-lightbulb" style="color: #FFFFFF; font-size: 28px;"></i>
          </div>
        </div>
        
        <!-- 创意光芒 -->
        <div style="position: absolute; top: 95px; left: 50%; transform: translateX(-50%); width: 80px; height: 8px; background: linear-gradient(90deg, transparent 0%, #FF6D00 50%, transparent 100%); opacity: 0.5; border-radius: 4px;"></div>
        
        <!-- 圆形桌面 -->
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 200px; height: 200px; background: linear-gradient(135deg, #1565C0 0%, #00ACC1 100%); border-radius: 50%; opacity: 0.15;"></div>
        <div style="position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 160px; height: 160px; background: linear-gradient(135deg, #1565C0 0%, #00ACC1 100%); border-radius: 50%; opacity: 0.25;"></div>
        
        <!-- 人物1 - 顶部 -->
        <div style="position: absolute; top: 140px; left: 50%; transform: translateX(-50%);">
          <div style="width: 48px; height: 48px; background: #FF6D00; border-radius: 50%; display: flex; align-items: center; justify-content: center;"></div>
          <div style="width: 32px; height: 20px; background: #FF6D00; margin: -4px auto 0; border-radius: 8px 8px 0 0;"></div>
        </div>
        
        <!-- 对话气泡1 -->
        <div style="position: absolute; top: 90px; left: 50%; transform: translateX(-50%); background: #FFFFFF; padding: 8px 14px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
          <span style="font-size: 12px; color: #1565C0; font-weight: 500;">💡</span>
        </div>
        
        <!-- 人物2 - 左上 -->
        <div style="position: absolute; top: 200px; left: 80px;">
          <div style="width: 44px; height: 44px; background: #1565C0; border-radius: 50%; display: flex; align-items: center; justify-content: center;"></div>
          <div style="width: 28px; height: 18px; background: #1565C0; margin: -4px auto 0; border-radius: 8px 8px 0 0;"></div>
        </div>
        
        <!-- 对话气泡2 -->
        <div style="position: absolute; top: 155px; left: 70px; background: #FFFFFF; padding: 8px 14px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
          <span style="font-size: 12px; color: #00ACC1; font-weight: 500;">✨</span>
        </div>
        
        <!-- 人物3 - 右上 -->
        <div style="position: absolute; top: 200px; right: 80px;">
          <div style="width: 44px; height: 44px; background: #00ACC1; border-radius: 50%; display: flex; align-items: center; justify-content: center;"></div>
          <div style="width: 28px; height: 18px; background: #00ACC1; margin: -4px auto 0; border-radius: 8px 8px 0 0;"></div>
        </div>
        
        <!-- 对话气泡3 -->
        <div style="position: absolute; top: 155px; right: 70px; background: #FFFFFF; padding: 8px 14px; border-radius: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.1);">
          <span style="font-size: 12px; color: #FF6D00; font-weight: 500;">🚀</span>
        </div>
        
        <!-- 人物4 - 左下 -->
        <div style="position: absolute; top: 340px; left: 120px;">
          <div style="width: 40px; height: 40px; background: #00ACC1; border-radius: 50%; display: flex; align-items: center; justify-content: center;"></div>
          <div style="width: 26px; height: 16px; background: #00ACC1; margin: -4px auto 0; border-radius: 8px 8px 0 0;"></div>
        </div>
        
        <!-- 人物5 - 右下 -->
        <div style="position: absolute; top: 340px; right: 120px;">
          <div style="width: 40px; height: 40px; background: #FF6D00; border-radius: 50%; display: flex; align-items: center; justify-content: center;"></div>
          <div style="width: 26px; height: 16px; background: #FF6D00; margin: -4px auto 0; border-radius: 8px 8px 0 0;"></div>
        </div>
        
        <!-- 连接线条 - 思想碰撞 -->
        <svg style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none;" viewBox="0 0 560 556">
          <defs>
            <linearGradient id="lineGradient1" x1="0%" y1="0%" x2="100%" y2="0%">
              <stop offset="0%" style="stop-color:#1565C0;stop-opacity:0.3" />
              <stop offset="100%" style="stop-color:#00ACC1;stop-opacity:0.3" />
            </linearGradient>
          </defs>
          <path d="M 200 220 Q 280 280 360 220" fill="none" stroke="url(#lineGradient1)" stroke-width="2" stroke-dasharray="6,4"/>
          <path d="M 180 250 Q 280 320 380 250" fill="none" stroke="url(#lineGradient1)" stroke-width="2" stroke-dasharray="6,4"/>
        </svg>
        
        <!-- 装饰齿轮 -->
        <div style="position: absolute; bottom: 40px; left: 40px;">
          <i class="fa-solid fa-gear" style="color: #00ACC1; font-size: 36px; opacity: 0.3;"></i>
        </div>
        <div style="position: absolute; bottom: 80px; right: 60px;">
          <i class="fa-solid fa-gear" style="color: #1565C0; font-size: 28px; opacity: 0.25;"></i>
        </div>
        
        <!-- 装饰星星 -->
        <div style="position: absolute; top: 180px; left: 40px;">
          <i class="fa-solid fa-star" style="color: #FF6D00; font-size: 14px; opacity: 0.4;"></i>
        </div>
        <div style="position: absolute; top: 130px; right: 50px;">
          <i class="fa-solid fa-star" style="color: #00ACC1; font-size: 12px; opacity: 0.5;"></i>
        </div>
        <div style="position: absolute; bottom: 120px; left: 100px;">
          <i class="fa-solid fa-star" style="color: #1565C0; font-size: 10px; opacity: 0.35;"></i>
        </div>
        
        <!-- 底部标签 -->
        <div style="position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); display: flex; gap: 12px;">
          <div style="background: #1565C0; color: #FFFFFF; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; font-family: 'Microsoft YaHei', sans-serif;">团队协作</div>
          <div style="background: #00ACC1; color: #FFFFFF; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; font-family: 'Microsoft YaHei', sans-serif;">创新实践</div>
          <div style="background: #FF6D00; color: #FFFFFF; padding: 8px 16px; border-radius: 20px; font-size: 14px; font-weight: 500; font-family: 'Microsoft YaHei', sans-serif;">学习交流</div>

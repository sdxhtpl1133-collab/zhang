<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>目录</title>
  <script src="https://qn.cache.wpscdn.cn/copilot-test/copilot-cdn/js/tailwindcss@3.4.17.js"></script>
  <link href="https://qn.cache.wpscdn.cn/copilot-test/copilot-cdn/css/fontawesome-free@6.4.0.css" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      list-style: none;
      text-decoration: none;
      box-sizing: border-box;
      user-select: none;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    .slide-container {
      width: 100vw;
      height: 100vh;
      display: flow-root;
      background: #F5F9FC;
      position: relative;
    }
    
    .slide-layout {
      display: flex;
      width: 100%;
      height: 100%;
    }
    
    .slide-left-nav {
      width: 427px;
      height: 720px;
      background: linear-gradient(180deg, #1565C0 0%, #00ACC1 100%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding-top: 50px;
      padding-left: 40px;
      padding-right: 40px;
      padding-bottom: 0;
      position: relative;
      overflow: hidden;
    }
    
    .slide-title-area {
      color: #FFFFFF;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      font-size: 40px;
      font-weight: 700;
      letter-spacing: 12px;
      text-align: left;
      position: relative;
      z-index: 2;
    }
    
    .slide-decoration {
      width: 100%;
      height: 500px;
      position: relative;
      overflow: hidden;
    }
    
    .slide-circle-large {
      width: 200px;
      height: 200px;
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 50%;
      position: absolute;
      bottom: -60px;
      left: 50%;
      transform: translateX(-50%);
    }
    
    .slide-circle-medium {
      width: 140px;
      height: 140px;
      border: 2px solid rgba(255,255,255,0.2);
      border-radius: 50%;
      position: absolute;
      bottom: -30px;
      left: 50%;
      transform: translateX(-50%);
    }
    
    .slide-circle-small {
      width: 80px;
      height: 80px;
      border: 2px solid rgba(255,255,255,0.25);
      border-radius: 50%;
      position: absolute;
      bottom: 10px;
      left: 50%;
      transform: translateX(-50%);
    }
    
    .slide-dot {
      width: 8px;
      height: 8px;
      background: rgba(255,255,255,0.3);
      border-radius: 50%;
      position: absolute;
    }
    
    .slide-dot-1 { bottom: 180px; left: 80px; }
    .slide-dot-2 { bottom: 220px; right: 70px; }
    .slide-dot-3 { bottom: 100px; left: 60px; }
    .slide-dot-4 { bottom: 60px; right: 50px; }
    .slide-dot-5 { bottom: 280px; left: 50%; }
    .slide-dot-6 { bottom: 320px; left: 60px; }
    .slide-dot-7 { bottom: 350px; right: 70px; }
    
    .slide-line {
      position: absolute;
      background: rgba(255,255,255,0.12);
    }
    
    .slide-line-1 {
      width: 80px;
      height: 2px;
      bottom: 184px;
      left: 88px;
      transform: rotate(-15deg);
    }
    
    .slide-line-2 {
      width: 100px;
      height: 2px;
      bottom: 262px;
      right: 0;
      transform: rotate(-30deg);
    }
    
    .slide-line-3 {
      width: 60px;
      height: 2px;
      bottom: 385px;
      left: 68px;
      transform: rotate(20deg);
    }
    
    .slide-gear {
      position: absolute;
      border: 3px solid rgba(255,255,255,0.15);
      border-radius: 50%;
    }
    
    .slide-gear-1 {
      width: 120px;
      height: 120px;
      bottom: 400px;
      right: -40px;
    }
    
    .slide-gear-2 {
      width: 60px;
      height: 60px;
      bottom: 200px;
      left: -20px;
    }
    
    .slide-right-content {
      width: 853px;
      height: 720px;
      background: #F5F9FC;
      display: flex;
      align-items: center;
      padding-top: 40px;
      padding-left: 60px;
      padding-right: 60px;
    }
    
    .slide-grid-container {
      width: 100%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: repeat(4, 1fr);
      gap: 20px;
    }
    
    .slide-item {
      display: flex;
      align-items: center;
      gap: 20px;
      background: #FFFFFF;
      border-radius: 12px;
      padding-top: 16px;
      padding-bottom: 16px;
      padding-left: 24px;
      padding-right: 24px;
      box-shadow: 0 4px 16px rgba(21,101,192,0.08);
    }
    
    .slide-number {
      font-size: 36px;
      font-weight: 700;
      color: #1565C0;
      font-family: "Microsoft YaHei", Arial, sans-serif;
      min-width: 50px;
    }
    
    .slide-item-title {
      font-size: 24px;
      font-weight: 500;
      color: #333333;
      font-family: "Microsoft YaHei", Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div class="slide-container">
    <div class="slide-layout">
      <div class="slide-left-nav">
        <div class="slide-title-area">目录</div>
        <div class="slide-decoration">
          <div class="slide-circle-large"></div>
          <div class="slide-circle-medium"></div>
          <div class="slide-circle-small"></div>
          <div class="slide-dot slide-dot-1"></div>
          <div class="slide-dot slide-dot-2"></div>
          <div class="slide-dot slide-dot-3"></div>
          <div class="slide-dot slide-dot-4"></div>
          <div class="slide-dot slide-dot-5"></div>
          <div class="slide-dot slide-dot-6"></div>
          <div class="slide-dot slide-dot-7"></div>
          <div class="slide-line slide-line-1"></div>
          <div class="slide-line slide-line-2"></div>
          <div class="slide-line slide-line-3"></div>
          <div class="slide-gear slide-gear-1"></div>
          <div class="slide-gear slide-gear-2"></div>
        </div>
      </div>
      <div class="slide-right-content">
        <div class="slide-grid-container">
          <div class="slide-item">
            <span class="slide-number">01</span>
            <span class="slide-item-title">我们是谁</span>
          </div>
          <div class="slide-item">
            <span class="slide-number">02</span>
            <span class="slide-item-title">我们的使命</span>
          </div>
          <div class="slide-item">
            <span class="slide-number">03</span>
            <span class="slide-item-title">我们能提供</span>
          </div>
          <div class="slide-item">
            <span class="slide-number">04</span>
            <span class="slide-item-title">加入我们的理由</span>
          </div>
          <div class="slide-item">
            <span class="slide-number">05</span>
            <span class="slide-item-title">招新要求</span>
          </div>
          <div class="slide-item">
            <span class="slide-number">06</span>
            <span class="slide-item-title">招新流程</span>
          </div>
          <div class="slide-item">
            <span class="slide-number">07</span>
            <span class="slide-item-title">往期活动展示</span>
          </div>
          <div class="slide-item">
            <span class="slide-number">08</span>
            <span class="slide-item-title">联系我们</span>
          </div>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

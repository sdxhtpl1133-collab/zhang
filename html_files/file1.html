<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>云南外事外语职业学院学习创新部招新</title>
  <script src="https://qn.cache.wpscdn.cn/copilot-test/copilot-cdn/js/tailwindcss@3.4.17.js"></script>
  <link href="https://qn.cache.wpscdn.cn/copilot-test/copilot-cdn/css/fontawesome-free@6.4.0.css" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      list-style: none;
      text-decoration: none;
      box-sizing: border-box;
      user-select: none;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    .slide-container {
      width: 100vw;
      height: 100vh;
      display: flow-root;
      position: relative;
      overflow: hidden;
      background: linear-gradient(135deg, #E3F2FD 0%, #B2EBF2 50%, #E8F5E9 100%);
    }
    
    .slide-container h1 {
      font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif !important;
      font-size: 52px !important;
      font-weight: 700 !important;
      line-height: 1.3 !important;
      color: #1565C0 !important;
      text-shadow: 0 4px 20px rgba(21, 101, 192, 0.2);
      text-align: center;
      max-width: 900px;
    }
    
    .slide-container h2 {
      font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif !important;
      font-size: 28px !important;
      font-weight: 400 !important;
      line-height: 1.4 !important;
      color: #00ACC1 !important;
      text-align: center;
      letter-spacing: 2px;
    }
    
    .slide-container p {
      font-family: "Microsoft YaHei", "SimHei", Arial, sans-serif !important;
      font-size: 18px !important;
      font-weight: 400 !important;
      color: #666666 !important;
      text-align: center;
    }
    
    .slide-content-wrapper {
      position: relative;
      z-index: 10;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
    }
    
    .slide-main-area {
      padding-top: 160px;
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      align-items: center;
    }
    
    .slide-subtitle {
      padding-top: 24px;
    }
    
    .slide-date-area {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      display: flex;
      justify-content: center;
      align-items: flex-end;
    }
    
    .slide-date-inner {
      padding-bottom: 28px;
    }
    
    .slide-icon-decor {
      position: absolute;
      z-index: 1;
    }
    
    .slide-icon-top-left {
      top: 80px;
      left: 60px;
      font-size: 48px;
      color: #1565C0;
      opacity: 0.18;
    }
    
    .slide-icon-top-right {
      top: 70px;
      right: 80px;
      font-size: 56px;
      color: #00ACC1;
      opacity: 0.15;
    }
    
    .slide-icon-bottom-left {
      bottom: 120px;
      left: 100px;
      font-size: 40px;
      color: #00ACC1;
      opacity: 0.12;
    }
    
    .slide-icon-bottom-right {
      bottom: 100px;
      right: 120px;
      font-size: 44px;
      color: #FF6D00;
      opacity: 0.14;
    }
    
    .slide-building-decor {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 80px;
      z-index: 0;
    }
    
    .slide-building-1 {
      position: absolute;
      left: 80px;
      bottom: 0;
      width: 120px;
      height: 50px;
      background-color: #1565C0;
      opacity: 0.08;
      border-radius: 4px 4px 0 0;
    }
    
    .slide-building-2 {
      position: absolute;
      left: 220px;
      bottom: 0;
      width: 80px;
      height: 65px;
      background-color: #00ACC1;
      opacity: 0.06;
      border-radius: 3px 3px 0 0;
    }
    
    .slide-building-3 {
      position: absolute;
      left: 320px;
      bottom: 0;
      width: 60px;
      height: 40px;
      background-color: #1565C0;
      opacity: 0.07;
      border-radius: 2px 2px 0 0;
    }
    
    .slide-building-4 {
      position: absolute;
      right: 280px;
      bottom: 0;
      width: 100px;
      height: 55px;
      background-color: #1565C0;
      opacity: 0.07;
      border-radius: 4px 4px 0 0;
    }
    
    .slide-building-5 {
      position: absolute;
      right: 160px;
      bottom: 0;
      width: 90px;
      height: 45px;
      background-color: #00ACC1;
      opacity: 0.05;
      border-radius: 3px 3px 0 0;
    }
    
    .slide-building-6 {
      position: absolute;
      right: 60px;
      bottom: 0;
      width: 70px;
      height: 35px;
      background-color: #1565C0;
      opacity: 0.06;
      border-radius: 2px 2px 0 0;
    }
  </style>
</head>
<body>
  <div class="slide-container">
    <!-- 建筑轮廓装饰 -->
    <div class="slide-building-decor">
      <div class="slide-building-1"></div>
      <div class="slide-building-2"></div>
      <div class="slide-building-3"></div>
      <div class="slide-building-4"></div>
      <div class="slide-building-5"></div>
      <div class="slide-building-6"></div>
    </div>
    
    <!-- 装饰图标 -->
    <i class="fa-solid fa-lightbulb slide-icon-decor slide-icon-top-left"></i>
    <i class="fa-solid fa-gear slide-icon-decor slide-icon-top-right"></i>
    <i class="fa-solid fa-gear slide-icon-decor slide-icon-bottom-left"></i>
    <i class="fa-solid fa-lightbulb slide-icon-decor slide-icon-bottom-right"></i>
    
    <!-- 主内容区域 -->
    <div class="slide-content-wrapper">
      <div class="slide-main-area">
        <h1>云南外事外语职业学院学习创新部招新</h1>
        <div class="slide-subtitle">
          <h2>开启学习与创新的新篇章</h2>
        </div>
      </div>
      
      <div class="slide-date-area">
        <div class="slide-date-inner">
          <p>2026年03月15日 星期日</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>联系我们</title>
    <script src="https://qn.cache.wpscdn.cn/copilot-test/copilot-cdn/js/tailwindcss@3.4.17.js"></script>
    <link href="https://qn.cache.wpscdn.cn/copilot-test/copilot-cdn/css/fontawesome-free@6.4.0.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            list-style: none;
            text-decoration: none;
            box-sizing: border-box;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .slide-container {
            width: 100vw;
            height: 100vh;
            display: flow-root;
            background: #F5F9FC;
            position: relative;
            overflow: hidden;
        }
        
        /* 背景装饰 */
        .slide-leaf-decor {
            position: absolute;
            top: 80px;
            left: 20px;
            width: 120px;
            height: 120px;
            border-radius: 0 100px 0 100px;
            background: linear-gradient(135deg, rgba(21,101,192,0.1), rgba(0,172,193,0.1));
        }
        
        .slide-book-decor {
            position: absolute;
            bottom: 60px;
            right: 40px;
            width: 100px;
            height: 80px;
            background: linear-gradient(to right, rgba(21,101,192,0.08), rgba(0,172,193,0.08));
            border-radius: 4px;
            box-shadow: -8px 8px 0 rgba(21,101,192,0.06);
        }
        
        .slide-circle-decor {
            position: absolute;
            top: 120px;
            right: 100px;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            background: rgba(255,109,0,0.1);
        }
        
        .slide-leaf-decor2 {
            position: absolute;
            bottom: 180px;
            left: 50px;
            width: 80px;
            height: 80px;
            border-radius: 100px 0 100px 0;
            background: linear-gradient(135deg, rgba(0,172,193,0.08), rgba(21,101,192,0.08));
        }
        
        /* 页面标题 */
        .slide-page-title {
            font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
            font-size: 36px !important;
            font-weight: 700;
            color: #1565C0;
            padding-top: 40px;
            margin-left: 60px;
        }
        
        /* 主内容容器 */
        .slide-main-content {
            display: flex;
            flex-direction: row;
            gap: 40px;
            margin-left: 60px;
            margin-right: 60px;
            margin-top: 24px;
            height: 540px;
        }
        
        /* 左侧信息区 */
        .slide-info-section {
            width: 648px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }
        
        /* 信息卡片 */
        .slide-info-card {
            background: #FFFFFF;
            border-radius: 16px;
            padding: 28px 32px;
            box-shadow: 0 4px 20px rgba(21,101,192,0.08);
            display: flex;
            align-items: center;
            gap: 20px;
        }
        
        .slide-card-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #1565C0, #00ACC1);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        
        .slide-card-icon i {
            color: #FFFFFF;
            font-size: 20px;
        }
        
        .slide-card-content {
            flex: 1;
        }
        
        .slide-card-title {
            font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
            font-size: 22px;
            font-weight: 600;
            color: #333333;
            margin-bottom: 8px;
        }
        
        .slide-card-text {
            font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
            font-size: 18px;
            font-weight: 400;
            color: #666666;
        }
        
        /* 右侧二维码区 */
        .slide-qr-section {
            width: 432px;
            background: #FFFFFF;
            border-radius: 20px;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 8px 32px rgba(21,101,192,0.12);
        }
        
        .slide-qr-container {
            width: 240px;
            height: 240px;
            background: linear-gradient(135deg, #1565C0, #00ACC1);
            border-radius: 16px;
            padding: 16px;
            margin-bottom: 24px;
        }
        
        .slide-qr-image {
            width: 208px;
            height: 208px;
            background: #FFFFFF;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .slide-qr-image i {
            font-size: 80px;
            color: #1565C0;
        }
        
        .slide-qr-text {
            font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
            font-size: 22px;
            font-weight: 600;
            color: #1565C0;
            margin-top: 8px;
        }
        
        .slide-qr-underline {
            width: 40px;
            height: 4px;
            background: #FF6D00;
            border-radius: 2px;
            margin-top: 12px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <!-- 背景装饰 -->
        <div class="slide-leaf-decor"></div>
        <div class="slide-leaf-decor2"></div>
        <div class="slide-book-decor"></div>
        <div class="slide-circle-decor"></div>
        
        <!-- 页面标题 -->
        <h1 class="slide-page-title">联系我们</h1>
        
        <!-- 主内容区 -->
        <div class="slide-main-content">
            <!-- 左侧信息区 -->
            <div class="slide-info-section">
                <!-- 卡片1 -->
                <div class="slide-info-card">
                    <div class="slide-card-icon">
                        <i class="fa-solid fa-building"></i>
                    </div>
                    <div class="slide-card-content">
                        <div class="slide-card-title">学习创新部社团办公室</div>
                        <div class="slide-card-text">XXX</div>
                    </div>
                </div>
                
                <!-- 卡片2 -->
                <div class="slide-info-card">
                    <div class="slide-card-icon">
                        <i class="fa-solid fa-comments"></i>
                    </div>
                    <div class="slide-card-content">
                        <div class="slide-card-title">微信/QQ咨询</div>
                        <div class="slide-card-text">XXX</div>
                    </div>
                </div>
                
                <!-- 卡片3 -->
                <div class="slide-info-card">
                    <div class="slide-card-icon">
                        <i class="fa-solid fa-bullhorn"></i>
                    </div>
                    <div class="slide-card-content">
                        <div class="slide-card-title">关注我们的公众号/社团主页</div>
                        <div class="slide-card-text">获取更多信息</div>
                    </div>
                </div>
            </div>
            
            <!-- 右侧二维码区 -->
            <div class="slide-qr-section">
                <div class="slide-qr-container">
                    <div class="slide-qr-image">
                        <i class="fa-solid fa-qrcode"></i>
                    </div>
                </div>
                <div class="slide-qr-text">扫码报名</div>
                <div class="slide-qr-underline"></div>
            </div>
        </div>
    </div>
</body>
</html>

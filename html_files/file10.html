<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫码报名</title>
    <script src="https://qn.cache.wpscdn.cn/copilot-test/copilot-cdn/js/tailwindcss@3.4.17.js"></script>
    <link href="https://qn.cache.wpscdn.cn/copilot-test/copilot-cdn/css/fontawesome-free@6.4.0.css" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            list-style: none;
            text-decoration: none;
            box-sizing: border-box;
            user-select: none;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        
        .slide-container {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #E3F2FD 0%, #B2EBF2 50%, #E8F5E9 100%);
            position: relative;
            overflow: hidden;
        }
        
        /* 背景装饰 */
        .slide-bg-circle {
            position: absolute;
            border-radius: 50%;
            background: rgba(21, 101, 192, 0.1);
        }
        
        .slide-bg-circle-1 {
            width: 300px;
            height: 300px;
            top: -100px;
            right: -100px;
        }
        
        .slide-bg-circle-2 {
            width: 200px;
            height: 200px;
            bottom: -50px;
            left: -50px;
        }
        
        /* 页面标题 */
        .slide-title {
            font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
            font-size: 48px !important;
            font-weight: 700;
            color: #1565C0;
            margin-bottom: 40px;
            text-shadow: 0 4px 20px rgba(21, 101, 192, 0.2);
        }
        
        /* 二维码容器 */
        .slide-qr-container {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #1565C0, #00ACC1);
            border-radius: 24px;
            padding: 30px;
            box-shadow: 0 12px 40px rgba(21, 101, 192, 0.2);
            margin-bottom: 32px;
        }
        
        /* 二维码图片 */
        .slide-qr-image {
            width: 340px;
            height: 340px;
            background: #FFFFFF;
            border-radius: 16px;
            overflow: hidden;
        }
        
        .slide-qr-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* 提示文字 */
        .slide-qr-text {
            font-family: "Microsoft YaHei", "微软雅黑", Arial, sans-serif;
            font-size: 28px;
            font-weight: 600;
            color: #1565C0;
            text-align: center;
        }
        
        /* 装饰图标 */
        .slide-icon {
            position: absolute;
            font-size: 48px;
            color: rgba(21, 101, 192, 0.1);
        }
        
        .slide-icon-1 {
            top: 100px;
            left: 100px;
        }
        
        .slide-icon-2 {
            top: 150px;
            right: 150px;
        }
        
        .slide-icon-3 {
            bottom: 100px;
            left: 150px;
        }
        
        .slide-icon-4 {
            bottom: 150px;
            right: 100px;
        }
    </style>
</head>
<body>
    <div class="slide-container">
        <!-- 背景装饰 -->
        <div class="slide-bg-circle slide-bg-circle-1"></div>
        <div class="slide-bg-circle slide-bg-circle-2"></div>
        
        <!-- 装饰图标 -->
        <i class="fa-solid fa-qrcode slide-icon slide-icon-1"></i>
        <i class="fa-solid fa-mobile-alt slide-icon slide-icon-2"></i>
        <i class="fa-solid fa-mobile-alt slide-icon slide-icon-3"></i>
        <i class="fa-solid fa-qrcode slide-icon slide-icon-4"></i>
        
        <!-- 页面标题 -->
        <h1 class="slide-title">扫码报名</h1>
        
        <!-- 二维码区域 -->
        <div class="slide-qr-container">
            <div class="slide-qr-image">
                <img src="../images/5.webp" alt="扫码报名">
            </div>
        </div>
        
        <!-- 提示文字 -->
        <div class="slide-qr-text">
            扫描二维码加入我们
        </div>
    </div>
</body>
</html>

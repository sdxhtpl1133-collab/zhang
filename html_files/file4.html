<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>我们的使命</title>
  <script src="https://qn.cache.wpscdn.cn/copilot-test/copilot-cdn/js/tailwindcss@3.4.17.js"></script>
  <link href="https://qn.cache.wpscdn.cn/copilot-test/copilot-cdn/css/fontawesome-free@6.4.0.css" rel="stylesheet" />
  <style>
    * {
      margin: 0;
      padding: 0;
      list-style: none;
      text-decoration: none;
      box-sizing: border-box;
      user-select: none;
    }
    
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }
    
    .slide-container {
      width: 100vw;
      height: 100vh;
      display: flow-root;
      background: linear-gradient(135deg, #F5F9FC 0%, #E3F2FD 100%);
    }
    
    .slide-title-wrapper {
      padding-top: 40px;
      padding-left: 60px;
      padding-right: 60px;
    }
    
    .slide-title {
      font-size: 36px !important;
      font-weight: 700 !important;
      color: #1565C0;
      font-family: "微软雅黑", Arial, sans-serif;
      border-left: 4px solid #00ACC1;
      padding-left: 16px;
      line-height: 52px;
    }
    
    .slide-cards-wrapper {
      padding-left: 60px;
      padding-right: 60px;
      padding-top: 28px;
    }
    
    .slide-cards-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      gap: 24px;
      height: 560px;
    }
    
    .slide-card {
      background: linear-gradient(180deg, #FFFFFF 0%, #F8FBFD 100%);
      border-radius: 16px;
      box-shadow: 0 4px 20px rgba(21, 101, 192, 0.08);
      border: 1px solid rgba(21, 101, 192, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 32px;
      padding-left: 32px;
      padding-right: 32px;
    }
    
    .slide-icon-circle {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #E3F2FD 0%, #B2EBF2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
    }
    
    .slide-icon-blue {
      font-size: 28px;
      color: #1565C0;
    }
    
    .slide-icon-orange {
      font-size: 28px;
      color: #FF6D00;
    }
    
    .slide-icon-cyan {
      font-size: 28px;
      color: #00ACC1;
    }
    
    .slide-card-title {
      font-size: 22px !important;
      font-weight: 600 !important;
      color: #1565C0;
      margin-bottom: 12px;
      font-family: "微软雅黑", Arial, sans-serif;
    }
    
    .slide-card-desc {
      font-size: 18px !important;
      font-weight: 400 !important;
      color: #666666;
      text-align: center;
      line-height: 1.6;
      max-width: 480px;
      font-family: "微软雅黑", Arial, sans-serif;
    }
  </style>
</head>
<body>
  <div class="slide-container">
    <!-- 标题区 -->
    <div class="slide-title-wrapper">
      <h1 class="slide-title">我们的使命</h1>
    </div>
    
    <!-- 卡片区 -->
    <div class="slide-cards-wrapper">
      <div class="slide-cards-grid">
        <!-- 左上卡片：激发热情 -->
        <div class="slide-card">
          <div class="slide-icon-circle">
            <i class="fa-solid fa-book slide-icon-blue"></i>
          </div>
          <h2 class="slide-card-title">激发热情</h2>
          <p class="slide-card-desc">激发学生学习热情，提升学术能力</p>
        </div>
        
        <!-- 右上卡片：培养能力 -->
        <div class="slide-card">
          <div class="slide-icon-circle">
            <i class="fa-solid fa-lightbulb slide-icon-orange"></i>
          </div>
          <h2 class="slide-card-title">培养能力</h2>
          <p class="slide-card-desc">培养创新思维和实践能力</p>
        </div>
        
        <!-- 左下卡片：搭建平台 -->
        <div class="slide-card">
          <div class="slide-icon-circle">
            <i class="fa-solid fa-share-nodes slide-icon-cyan"></i>
          </div>
          <h2 class="slide-card-title">搭建平台</h2>
          <p class="slide-card-desc">搭建学习资源分享与交流平台</p>
        </div>
        
        <!-- 右下卡片：活动支持 -->
        <div class="slide-card">
          <div class="slide-icon-circle">
            <i class="fa-solid fa-flag slide-icon-blue"></i>
          </div>
          <h2 class="slide-card-title">活动支持</h2>
          <p class="slide-card-desc">为校园活动提供学习和创新支持</p>
        </div>
      </div>
    </div>
  </div>
</body>
</html>
